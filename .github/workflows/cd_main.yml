name: Push on Main

# on:
#   workflow_dispatch:
#   push:
#     branches: [main]
#     paths:
#       - 'develop-project/**'
on:
  push:
    tags:
      - 'v*'

jobs:  
  push_on_main:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/medical_chatbot_web:${GITHUB_REF_NAME}  ./develop-project 
        

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/medical_chatbot_web:${GITHUB_REF_NAME}
     
